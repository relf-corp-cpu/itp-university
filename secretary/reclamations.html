  <nav role="navigation" style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
    <a href="index.html"        class="nav-link"><i class="fas fa-user-plus"></i> Inscriptions</a>
    <a href="attestations.html" class="nav-link"><i class="fas fa-file-alt"></i> Attestations</a>
    <a href="reclamations.html" class="nav-link active"><i class="fas fa-exclamation-circle"></i> Réclamations</a>

  </nav>
</aside>
<main class="dashboard-main" id="main-content" role="main">

  <div class="page-header">
    <div><h2 class="page-title">Gestion des Réclamations</h2><p class="text-muted-sm m-0">Traitement des demandes et doléances étudiantes</p></div>
    <button class="btn-outline" onclick="Excel.exportCSV(FB_REC,'reclamations.csv')"><i class="fas fa-file-excel"></i> Export</button>
  </div>
  <div class="kpi-row mb-30">
    <div class="stat-card" style="border-left-color:var(--red-itp);"><p class="stat-label">Ouvertes</p><div class="stat-val" id="k-open">—</div></div>
    <div class="stat-card" style="border-left-color:#f57c00;"><p class="stat-label">En cours</p><div class="stat-val" id="k-proc">—</div></div>
    <div class="stat-card" style="border-left-color:#28a745;"><p class="stat-label">Résolues</p><div class="stat-val" id="k-resolved">—</div></div>
    <div class="stat-card" style="border-left-color:#666;"><p class="stat-label">Fermées</p><div class="stat-val" id="k-closed">—</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <div class="table-wrapper">
      <table class="data-table" role="table"><thead><tr><th>Étudiant</th><th>Sujet</th><th>Type</th><th>Priorité</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody id="rec-table"></tbody></table>
    </div>
  </div>
  <script>
  const ST = {open:{l:"Ouverte",c:"badge-danger"},processing:{l:"En cours",c:"badge-warning"},resolved:{l:"Résolue",c:"badge-success"},closed:{l:"Fermée",c:"badge-dark"}};
  const PR = {low:"Faible",medium:"Moyen",high:"Élevé",urgent:"URGENT"};
  const FB_REC = [
    {id:1,student:"MACKAYA Djepht",subject:"Contestation note Algorithmique",type:"note",priority:"high",date:"2026-06-25",status:"open"},
    {id:2,student:"M'BOKA Alice",subject:"Erreur sur reçu de paiement",type:"paiement",priority:"medium",date:"2026-06-24",status:"processing"},
    {id:3,student:"TRAORÉ Moussa",subject:"Carte étudiante non reçue",type:"administratif",priority:"low",date:"2026-06-20",status:"resolved"},
    {id:4,student:"LOUZOLO Patrick",subject:"Absence injustifiée contestée",type:"academique",priority:"urgent",date:"2026-06-28",status:"open"},
  ];
  let recs = [...FB_REC];
  function renderRec(list) {
    document.getElementById("k-open").textContent    = recs.filter(r=>r.status==="open").length;
    document.getElementById("k-proc").textContent    = recs.filter(r=>r.status==="processing").length;
    document.getElementById("k-resolved").textContent= recs.filter(r=>r.status==="resolved").length;
    document.getElementById("k-closed").textContent  = recs.filter(r=>r.status==="closed").length;
    document.getElementById("rec-table").innerHTML = list.map(r => {
      const st = ST[r.status]||ST.open;
      return "<tr><td><strong>"+Security.sanitize(r.student)+"</strong></td><td>"+Security.sanitize(r.subject)+"</td><td>"+r.type+"</td><td style=\"font-weight:bold;color:"+(r.priority==="urgent"?"var(--red-itp)":r.priority==="high"?"#f57c00":"#666")+";\">"+(PR[r.priority]||r.priority)+"</td><td class=\"text-muted-sm\">"+new Date(r.date).toLocaleDateString("fr-FR")+"</td><td><span class=\"badge "+st.c+"\">"+st.l+"</span></td><td><div class=\"d-flex gap-5\"><button class=\"btn-primary\" style=\"padding:4px 10px;font-size:0.78rem;\" onclick=\"respond("+r.id+")\" >Répondre</button></div></td></tr>";
    }).join("");
  }
  function respond(id) {
    const r = recs.find(x=>x.id===id);
    Modal.show("Répondre — "+r.subject,
      "<div class=\"form-group\"><label class=\"form-label\">Réponse officielle</label><textarea id=\"resp-text\" class=\"form-control\" style=\"height:120px;\" placeholder=\"Votre réponse...\"></textarea></div><div class=\"form-group\"><label class=\"form-label\">Nouveau statut</label><select id=\"resp-status\" class=\"form-control\"><option value=\"processing\">En cours</option><option value=\"resolved\">Résolue</option><option value=\"closed\">Fermée</option></select></div>",
      [{label:"Envoyer",cls:"btn-primary",fn:"sendResponse("+id+")"},{label:"Annuler",cls:"btn-outline",fn:"Modal.close()"}]
    );
  }
  function sendResponse(id) {
    const status = document.getElementById("resp-status")?.value;
    const r = recs.find(x=>x.id===id); if(r) r.status=status;
    renderRec(recs); Modal.close();
    showToast("✅ Réponse envoyée à l\'étudiant.","success");
    Security.log("complaint_responded",{id,status});
  }
  renderRec(recs);
  </script>
</main>
