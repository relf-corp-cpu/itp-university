<!DOCTYPE html><html lang="fr"><head>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1D3557"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Actualités — ITP University</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" href="../assets/images/icon-192.png"></head><body>
<a href="#main-content" class="sr-only" style="position:absolute;left:-999px;" onfocus="this.style.left='10px'">Aller au contenu principal</a>

<div id="itp-header"></div>
<main role="main" id="main-content" style="padding:50px;max-width:1100px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;flex-wrap:wrap;gap:15px;">
    <h2 class="m-0">Actualités de l'Institut</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="filter-cat btn-outline active" onclick="filterCat('',this)" style="padding:6px 14px;font-size:0.85rem;">Tout</button>
      <button class="filter-cat btn-outline" onclick="filterCat('ÉVÉNEMENT',this)" style="padding:6px 14px;font-size:0.85rem;">Événements</button>
      <button class="filter-cat btn-outline" onclick="filterCat('PARTENARIAT',this)" style="padding:6px 14px;font-size:0.85rem;">Partenariats</button>
      <button class="filter-cat btn-outline" onclick="filterCat('ACADÉMIQUE',this)" style="padding:6px 14px;font-size:0.85rem;">Académique</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:40px;">
    <div id="articles-list">
      <div style="padding:30px;text-align:center;color:#999;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    </div>
    <aside>
      <div class="card" class="mb-30">
        <h3>Catégories</h3>
        <ul style="list-style:none;padding:0;margin-top:15px;">
          <li style="padding:10px 0;border-bottom:1px solid var(--light-grey);cursor:pointer;" onclick="filterCat('ACADÉMIQUE')"><a style="text-decoration:none;color:var(--black);">Académique</a></li>
          <li style="padding:10px 0;border-bottom:1px solid var(--light-grey);cursor:pointer;" onclick="filterCat('PARTENARIAT')"><a style="text-decoration:none;color:var(--black);">Partenariats</a></li>
          <li style="padding:10px 0;border-bottom:1px solid var(--light-grey);cursor:pointer;" onclick="filterCat('ÉVÉNEMENT')"><a style="text-decoration:none;color:var(--black);">Événements</a></li>
          <li style="padding:10px 0;" onclick="filterCat('')"><a style="text-decoration:none;color:var(--black);">Tout voir</a></li>
        </ul>
      </div>
      <div class="card" style="background:var(--dark-blue);color:white;">
        <h3>Newsletter</h3>
        <p>Recevez les actualités de l'ITP directement dans votre boîte mail.</p>
        <input type="email" id="newsletter-email" placeholder="Votre email" style="width:100%;padding:10px;margin:15px 0;border-radius:4px;border:none;box-sizing:border-box;">
        <button class="btn-primary" onclick="subscribeNewsletter()" style="width:100%;background:var(--red-itp);">S'abonner</button>
        <p id="news-msg" style="margin:8px 0 0;font-size:0.8rem;display:none;"></p>
      </div>
    </aside>
  </div>
</main>
<div id="itp-footer"></div>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/tests.js"></script>
<script src="../assets/js/components.js"></script>
<script>
const FB_ARTICLES = [
  { id:1, title:'Cérémonie de remise des diplômes 2026', content:'Le 15 juillet prochain aura lieu la grande cérémonie annuelle au Palais des Congrès de Brazzaville. Plus de 300 étudiants seront mis à l\'honneur lors de cette célébration solennelle de la promotion 2026.', category:'ÉVÉNEMENT', published_at:'2026-06-20' },
  { id:2, title:'Nouveau laboratoire de Cybersécurité', content:'Grâce à notre partenaire technologique, l\'ITP se dote d\'un centre de recherche de pointe unique dans la région d\'Afrique centrale. Ce laboratoire permettra aux étudiants de travailler sur des cas réels.', category:'PARTENARIAT', published_at:'2026-06-15' },
  { id:3, title:'Hackathon ITP Brazzaville 2026', content:'48 heures pour innover et créer les solutions de demain. Inscriptions ouvertes jusqu\'au 20 juin 2026. Des prix seront attribués aux meilleures équipes.', category:'ACADÉMIQUE', published_at:'2026-06-10' },
];

const CAT_COLORS = { 'ÉVÉNEMENT':'var(--red-itp)', 'PARTENARIAT':'#2a9d8f', 'ACADÉMIQUE':'var(--dark-blue)' };
let allArticles = [];
let activeFilter = '';

async function loadArticles() {
  try {
    allArticles = await ITP_API.articles.getAll(10);
    if (!allArticles || !allArticles.length) allArticles = FB_ARTICLES;
  } catch { allArticles = FB_ARTICLES; }
  renderArticles(allArticles);
}

function renderArticles(articles) {
  const html = articles.map(a => {
    const date  = a.published_at ? new Date(a.published_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}) : '';
    const color = CAT_COLORS[a.category] || 'var(--dark-blue)';
    return `
      <div class="card article-card" data-cat="${a.category||''}" style="margin-bottom:25px;padding:20px;">
        <span style="color:${color};font-weight:bold;font-size:0.85rem;">${a.category||'GÉNÉRAL'}</span>
        <h3 style="margin:8px 0;">${a.title}</h3>
        <p style="color:#888;font-size:0.8rem;margin:0 0 10px;"><i class="fas fa-calendar"></i> ${date}</p>
        <p class="m-0">${a.content || ''}</p>
        <a href="#" style="color:var(--dark-blue);font-weight:bold;margin-top:10px;display:inline-block;">Lire la suite →</a>
      </div>`;
  }).join('');
  document.getElementById('articles-list').innerHTML = html || '<p style="color:#999;text-align:center;">Aucun article disponible.</p>';
}

function filterCat(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-cat').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const filtered = cat ? allArticles.filter(a => a.category === cat) : allArticles;
  renderArticles(filtered);
}

function subscribeNewsletter() {
  const email = document.getElementById('newsletter-email').value.trim();
  const msg   = document.getElementById('news-msg');
  if (!email) return;
  msg.style.display = 'block';
  msg.textContent   = '✅ Inscription confirmée ! Merci.';
  document.getElementById('newsletter-email').value = '';
}

loadArticles();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js').catch(() => {});
}
</script>

<!-- PWA Banner -->
<div id="pwa-banner">
  <div class="d-flex align-center gap-12">
    <img src="../assets/images/icon-192.png" style="width:36px;height:36px;border-radius:8px;">
    <div><strong>ITP University</strong><br><small>Installer l'application sur votre appareil</small></div>
  </div>
  <div class="d-flex gap-10">
    <button onclick="installPWA()" style="background:white;color:var(--dark-blue);border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font-weight:bold;">Installer</button>
    <button onclick="dismissPWA()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:1.2rem;">&#x2715;</button>
  </div>
</div>
</body></html>
