<!DOCTYPE html><html lang="fr"><head>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1D3557"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bourses — ITP University</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" href="../assets/images/icon-192.png"></head><body>
<a href="#main-content" class="sr-only" style="position:absolute;left:-999px;" onfocus="this.style.left='10px'">Aller au contenu principal</a>

<div id="itp-header"></div>
<main id="main-content" style="padding:50px;max-width:900px;margin:0 auto;">
  <h2 class="text-center mb-40">Bourses &amp; Aides Financières</h2>

  <!-- Liste dynamique des bourses -->
  <div id="scholarships-list">
    <div style="text-align:center;padding:30px;color:#999;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
  </div>

  <!-- Suivi des demandes -->
  <div class="card" style="margin-top:40px;background:#f8f9fa;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
      <h3 class="m-0">Mes demandes</h3>
      <span id="appli-status" class="text-muted-sm"><i class="fas fa-spinner fa-spin"></i></span>
    </div>
    <table role="table" style="width:100%;border-collapse:collapse;" id="applications-table">
      <thead><tr style="border-bottom:2px solid var(--light-grey);text-align:left;">
        <th style="padding:10px;">Type de demande</th>
        <th style="padding:10px;">Date</th>
        <th style="padding:10px;">Statut</th>
      </tr></thead>
      <tbody id="appli-body">
        <tr><td colspan="3" style="padding:15px;text-align:center;color:#999;">Connectez-vous pour voir vos demandes.</td></tr>
      </tbody>
    </table>
  </div>
</main>
<div id="itp-footer"></div>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/tests.js"></script>
<script src="../assets/js/components.js"></script>
<script>
const BORDER_COLORS = ['var(--red-itp)','var(--dark-blue)','#4caf50','#ff9800'];
const FB_SCHOLARSHIPS = [
  { id:1, name:'Bourse d\'Excellence ITP', amount:500000, description:'Pour les étudiants ayant obtenu une moyenne supérieure à 16/20. Couvre 100% des frais de scolarité.', deadline:'30 Septembre 2026' },
  { id:2, name:'Bourse Mérite Académique', amount:300000, description:'Aide partielle pour les étudiants avec une moyenne entre 14 et 16/20.', deadline:'15 Octobre 2026' },
  { id:3, name:'Aide Sociale au Transport', amount:50000, description:'Aide mensuelle pour les étudiants résidant à plus de 10 km du campus de Poto-Poto.', deadline:'Ouvert toute l\'année' },
];

async function loadScholarships() {
  let scholarships;
  try {
    scholarships = await ITP_API.scholarships.getAll();
    if (!scholarships || !scholarships.length) scholarships = FB_SCHOLARSHIPS;
  } catch { scholarships = FB_SCHOLARSHIPS; }
  renderScholarships(scholarships);
}

function renderScholarships(list) {
  document.getElementById('scholarships-list').innerHTML = list.map((s, i) => `
    <div class="card" style="margin-bottom:30px;border-left:5px solid ${BORDER_COLORS[i % BORDER_COLORS.length]};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div class="flex-1">
          <h3 style="margin:0 0 8px;">${s.name}</h3>
          <p style="margin:0 0 8px;">${s.description || ''}</p>
          <p style="margin:0;font-size:0.9rem;color:#666;"><i class="fas fa-money-bill-wave"></i> Montant : <strong>${parseInt(s.amount||0).toLocaleString('fr-FR')} FCFA</strong></p>
          ${s.deadline ? `<p style="margin:5px 0 0;font-size:0.9rem;color:#666;"><i class="fas fa-clock"></i> Date limite : ${s.deadline}</p>` : ''}
        </div>
        <button class="btn-primary" onclick="applyScholarship(${s.id},'${s.name.replace(/'/g,"\\'")}')">Demander</button>
      </div>
    </div>`).join('');
}

async function applyScholarship(id, name) {
  const user = ITP_API.auth.currentUser();
  if (!user) { if (confirm('Connectez-vous pour soumettre une demande.')) window.location.href='../auth/login.html'; return; }
  try {
    await ITP_API.scholarships.apply(id, user.student_id || 1);
    alert(`✅ Demande pour "${name}" soumise !\nVous recevrez une réponse sous 15 jours.`);
    loadApplications();
  } catch {
    alert(`✅ Demande pour "${name}" enregistrée (démo).\nVous recevrez une réponse sous 15 jours.`);
    appendFallbackAppli(name);
  }
}

async function loadApplications() {
  const user = ITP_API.auth.currentUser();
  if (!user) return;
  document.getElementById('appli-status').textContent = '';
  try {
    const apps = await ITP_API.scholarships.getApplications(user.student_id || 1);
    renderApplications(apps);
  } catch {
    document.getElementById('appli-body').innerHTML = '<tr><td colspan="3" style="padding:15px;text-align:center;color:#999;">Aucune demande en cours.</td></tr>';
    document.getElementById('appli-status').textContent = '';
  }
}

function renderApplications(apps) {
  const colors = { pending:'orange', approved:'green', rejected:'var(--red-itp)' };
  const labels = { pending:'⏳ En cours d\'examen', approved:'✅ Accordée', rejected:'✗ Refusée' };
  document.getElementById('appli-body').innerHTML = apps.length
    ? apps.map(a => `
        <tr style="border-bottom:1px solid var(--light-grey);">
          <td style="padding:10px;">${a.scholarships?.name || a.name || '—'}</td>
          <td style="padding:10px;">${a.created_at ? new Date(a.created_at).toLocaleDateString('fr-FR') : '—'}</td>
          <td style="padding:10px;color:${colors[a.status]||'grey'};font-weight:bold;">${labels[a.status]||a.status}</td>
        </tr>`).join('')
    : '<tr><td colspan="3" style="padding:15px;text-align:center;color:#999;">Aucune demande en cours.</td></tr>';
}

function appendFallbackAppli(name) {
  const tbody = document.getElementById('appli-body');
  const prev  = tbody.innerHTML.includes('Aucune') ? '' : tbody.innerHTML;
  tbody.innerHTML = prev + `
    <tr style="border-bottom:1px solid var(--light-grey);">
      <td style="padding:10px;">${name}</td>
      <td style="padding:10px;">${new Date().toLocaleDateString('fr-FR')}</td>
      <td style="padding:10px;color:orange;font-weight:bold;">⏳ En cours d'examen</td>
    </tr>`;
}

loadScholarships();
loadApplications();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js').catch(() => {});
}
</script>

<!-- PWA Banner -->
<div id="pwa-banner">
  <div class="d-flex align-center gap-12">
    <img src="../assets/images/icon-192.png" style="width:36px;height:36px;border-radius:8px;">
    <div><strong>ITP University</strong><br><small>Installer l'application sur votre appareil</small></div>
  </div>
  <div class="d-flex gap-10">
    <button onclick="installPWA()" style="background:white;color:var(--dark-blue);border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font-weight:bold;">Installer</button>
    <button onclick="dismissPWA()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:1.2rem;">&#x2715;</button>
  </div>
</div>
</body></html>
