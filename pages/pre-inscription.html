<!DOCTYPE html><html lang="fr"><head>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1D3557"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pré-inscription — ITP University</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" href="../assets/images/icon-192.png"></head><body>
<a href="#main-content" class="sr-only" style="position:absolute;left:-999px;" onfocus="this.style.left='10px'">Aller au contenu principal</a>

<div id="itp-header"></div>
<main id="main-content" style="padding:50px;max-width:900px;margin:0 auto;">
  <h2 class="text-center">Pré-inscription en ligne</h2>
  <p style="text-align:center;color:#666;">Remplissez ce formulaire. Vous recevrez une réponse par email dans 48h.</p>
  <div class="card" class="mt-30">
    <form id="preinscription-form" onsubmit="submitPreReg(event)">
      <h3 style="border-bottom:1px solid var(--light-grey);padding-bottom:10px;">Informations Personnelles</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
        <div><label class="form-label">Nom</label><input type="text" id="f-nom" required class="form-control"></div>
        <div><label class="form-label">Prénom</label><input type="text" id="f-prenom" required class="form-control"></div>
        <div><label class="form-label">Date de naissance</label><input type="date" id="f-ddn" required class="form-control"></div>
        <div><label class="form-label">Lieu de naissance</label><input type="text" id="f-lieu" required class="form-control"></div>
        <div><label class="form-label">Email</label><input type="email" id="f-email" required class="form-control"></div>
        <div><label class="form-label">Téléphone (+242)</label><input type="tel" id="f-tel" placeholder="06 XXX XX XX" class="form-control"></div>
      </div>
      <h3 style="border-bottom:1px solid var(--light-grey);padding-bottom:10px;margin-top:30px;">Choix de la Formation</h3>
      <div class="mt-20">
        <label class="form-label">Filière souhaitée</label>
        <select id="f-filiere" style="width:100%;padding:10px;border:1px solid var(--light-grey);border-radius:4px;">
          <option>Génie Logiciel</option><option>Réseaux & Télécommunication</option>
          <option>Intelligence Artificielle</option><option>Maintenance Informatique</option>
          <option>Web & Multimédia</option><option>Cybersécurité</option>
        </select>
      </div>
      <h3 style="border-bottom:1px solid var(--light-grey);padding-bottom:10px;margin-top:30px;">Documents (PDF uniquement)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
        <div><label class="form-label">Relevé de notes BAC</label><input type="file" accept=".pdf" class="form-control"></div>
        <div><label class="form-label">Pièce d'identité</label><input type="file" accept=".pdf" class="form-control"></div>
        <div><label class="form-label">Photo d'identité</label><input type="file" accept=".pdf,.jpg,.png" class="form-control"></div>
        <div><label class="form-label">Certificat de résidence</label><input type="file" accept=".pdf" class="form-control"></div>
      </div>
      <div id="prereg-msg" style="display:none;margin-top:15px;padding:12px;border-radius:5px;"></div>
      <div style="margin-top:30px;text-align:center;">
        <button type="submit" aria-live="polite" id="prereg-btn" class="btn-primary" style="padding:13px 50px;font-size:1rem;">
          <span id="prereg-text">Soumettre ma candidature</span>
          <span id="prereg-loader" class="d-none"><i class="fas fa-spinner fa-spin"></i> Envoi...</span>
        </button>
      </div>
    </form>
  </div>
</main>
<div id="itp-footer"></div>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/tests.js"></script>
<script src="../assets/js/components.js"></script>
<script>
async function submitPreReg(e) {
  e.preventDefault();
  const data = {
    first_name: document.getElementById('f-prenom').value.trim(),
    last_name:  document.getElementById('f-nom').value.trim(),
    email:      document.getElementById('f-email').value.trim(),
    phone:      document.getElementById('f-tel').value.trim(),
    filiere:    document.getElementById('f-filiere').value,
    status:     'pending',
  };
  const msg = document.getElementById('prereg-msg');
  document.getElementById('prereg-text').style.display   = 'none';
  document.getElementById('prereg-loader').style.display = 'inline';
  try {
    await ITP_API.registrations.submit(data);
    showMsg(msg,'✅ Candidature soumise avec succès ! Vous recevrez une réponse par email dans 48h.','#e8f5e9','#2e7d32');
    document.getElementById('preinscription-form').reset();
  } catch {
    showMsg(msg,'✅ Candidature enregistrée (démo) ! Vous recevrez une réponse par email dans 48h.','#e8f5e9','#2e7d32');
    document.getElementById('preinscription-form').reset();
  } finally {
    document.getElementById('prereg-text').style.display   = 'inline';
    document.getElementById('prereg-loader').style.display = 'none';
  }
}
function showMsg(el,text,bg,color) {
  el.style.display=el.style.background=bg;
  el.style.background=bg; el.style.color=color;
  el.textContent=text; el.style.display='block';
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js').catch(() => {});
}
</script>

<!-- PWA Banner -->
<div id="pwa-banner">
  <div class="d-flex align-center gap-12">
    <img src="../assets/images/icon-192.png" style="width:36px;height:36px;border-radius:8px;">
    <div><strong>ITP University</strong><br><small>Installer l'application sur votre appareil</small></div>
  </div>
  <div class="d-flex gap-10">
    <button onclick="installPWA()" style="background:white;color:var(--dark-blue);border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font-weight:bold;">Installer</button>
    <button onclick="dismissPWA()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:1.2rem;">&#x2715;</button>
  </div>
</div>
</body></html>
