<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bibliothèque — ITP University</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" href="../assets/images/icon-192.png">
<link rel="manifest" href="../manifest.json"><meta name="theme-color" content="#1D3557"></head><body>
<div id="itp-header"></div>
<main id="main-content" style="padding:50px;max-width:1200px;margin:0 auto;">
  <h2 style="text-align:center;margin-bottom:10px;">Bibliothèque Numérique ITP</h2>
  <p style="text-align:center;color:#666;margin-bottom:40px;">Campus Poto-Poto — Lun–Ven 08h00–17h00</p>

  <div id="tabs-biblio">
    <div class="tabs" style="justify-content:center;">
      <button class="tab active" data-tab="tab-catalogue">Catalogue</button>
      <button class="tab" data-tab="tab-emprunts">Mes Emprunts</button>
      <button class="tab" data-tab="tab-reservations">Réservations</button>
      <button class="tab" data-tab="tab-amendes">Amendes</button>
    </div>

    <!-- Catalogue -->
    <div class="tab-panel active" id="tab-catalogue">
      <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
        <input type="text" id="search-book" placeholder="Titre, auteur, domaine..." aria-label="Rechercher un livre" class="form-control" style="width:40%;min-width:200px;" oninput="searchBooks()">
        <button class="btn-primary" onclick="searchBooks()"><i class="fas fa-search"></i></button>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:25px;">
        <button class="btn-outline filter-btn active" onclick="filterCat('all',this)" style="padding:6px 14px;font-size:0.85rem;">Tous</button>
        <button class="btn-outline filter-btn" onclick="filterCat('algo',this)"   style="padding:6px 14px;font-size:0.85rem;">Algorithmique</button>
        <button class="btn-outline filter-btn" onclick="filterCat('web',this)"    style="padding:6px 14px;font-size:0.85rem;">Web & BDD</button>
        <button class="btn-outline filter-btn" onclick="filterCat('reseau',this)" style="padding:6px 14px;font-size:0.85rem;">Réseaux</button>
        <button class="btn-outline filter-btn" onclick="filterCat('secu',this)"   style="padding:6px 14px;font-size:0.85rem;">Cybersécurité</button>
      </div>
      <p id="books-status" style="text-align:center;color:#999;margin-bottom:15px;"><i class="fas fa-spinner fa-spin" aria-hidden="true"></i><span class="sr-only">Chargement en cours</span> Chargement...</p>
      <div id="books-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;"></div>
    </div>

    <!-- Mes Emprunts -->
    <div class="tab-panel" id="tab-emprunts">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
          <h3 class="m-0">Livres empruntés</h3>
          <button class="btn-outline" onclick="Excel.exportCSV(myLoans,'emprunts_itp.csv')"><i class="fas fa-file-excel"></i> Export</button>
        </div>
        <div id="loans-list" style="min-height:100px;"><p style="color:#999;text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i></p></div>
      </div>
    </div>

    <!-- Réservations -->
    <div class="tab-panel" id="tab-reservations">
      <div class="card">
        <h3>Mes Réservations</h3>
        <div id="reservations-list" style="margin-top:15px;min-height:80px;"><p style="color:#999;text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i></p></div>
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--light-grey);">
          <h4>Reserver un livre</h4>
          <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;">
            <select id="reserve-book" class="form-control" style="flex:1;min-width:200px;" onchange="document.getElementById('reserve-book').style.display='block'">
              <option value="">— Choisir un livre —</option>
            </select>
            <button class="btn-primary" onclick="makeReservation()">Réserver</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Amendes -->
    <div class="tab-panel" id="tab-amendes">
      <div class="card">
        <h3>Amendes de retard</h3>
        <div class="mt-15">
          <div class="card" style="background:#fff3e0;border-left:4px solid #ff9800;margin-bottom:20px;">
            <p class="m-0"><i class="fas fa-info-circle" style="color:#ff9800;"></i> <strong>Règle :</strong> 500 FCFA par jour de retard après la date de retour prévue. Durée d'emprunt maximale : 14 jours.</p>
          </div>
          <div id="fines-list">
            <p style="color:#999;text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<div id="itp-footer"></div>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/tests.js"></script>
<script src="../assets/js/components.js"></script>
<script>
const GRADS = { algo:'linear-gradient(135deg,#1D3557,#457b9d)', web:'linear-gradient(135deg,#4caf50,#2196f3)', reseau:'linear-gradient(135deg,#ff5722,#ff9800)', secu:'linear-gradient(135deg,#212121,#607d8b)', default:'linear-gradient(135deg,#9c27b0,#3f51b5)' };
const ICONS = { algo:'fa-code', web:'fa-database', reseau:'fa-network-wired', secu:'fa-shield-alt', default:'fa-book' };
const CATS  = { 'Algorithmique':'algo','Cormen':'algo','SQL':'web','MySQL':'web','PHP':'web','Laravel':'web','Réseaux':'reseau','réseau':'reseau','Sécurité':'secu','cybersécurité':'secu','Schneier':'secu' };

const FB_BOOKS = [
  { id:1, title:'Algorithmique Fondamentale', author:'Thomas H. Cormen', available:true },
  { id:2, title:'Maîtriser SQL & MySQL',      author:'C.J. Date',        available:true },
  { id:3, title:'Les Réseaux',                author:'Andrew Tanenbaum', available:false },
  { id:4, title:'PHP 8 & MySQL',              author:'Olivier Heurtel',  available:true },
  { id:5, title:'Laravel : Du Dev à la Prod', author:'Taylor Otwell',    available:true },
  { id:6, title:'Cybersécurité Avancée',      author:'Bruce Schneier',   available:true },
  { id:7, title:'Introduction à l\'IA',       author:'Stuart Russell',   available:true },
  { id:8, title:'Réseaux Mobiles 5G',         author:'Jochen Schiller',  available:true },
];
const FB_LOANS = [
  { book:'Algorithmique Fondamentale', date_emprunt:'2026-06-01', retour_prevu:'2026-06-15', status:'retard', jours_retard:10 },
  { book:'Laravel : Du Dev à la Prod', date_emprunt:'2026-06-10', retour_prevu:'2026-06-24', status:'encours', jours_retard:0 },
];
const FB_RESERVATIONS = [
  { book:'Les Réseaux', date_reservation:'2026-06-20', status:'en_attente' },
];
const FB_FINES = [
  { book:'Algorithmique Fondamentale', jours:10, montant:5000, status:'due' }
];

let allBooks = [];
let myLoans  = [...FB_LOANS];

function getCat(book) {
  const text = book.title + ' ' + book.author;
  for (const [kw, cat] of Object.entries(CATS)) { if (text.includes(kw)) return cat; }
  return 'default';
}

async function loadBooks() {
  try {
    allBooks = await ITP_API.library.getBooks();
    if (!allBooks?.length) allBooks = FB_BOOKS;
  } catch { allBooks = FB_BOOKS; }
  renderBooks(allBooks);
  populateReserveSelect(allBooks);
}

function renderBooks(books) {
  document.getElementById('books-status').textContent = `${books.length} livre(s)`;
  document.getElementById('books-grid').innerHTML = books.map(b => {
    const cat  = getCat(b);
    return `<div class="card book-item" data-cat="${cat}" style="padding:0;overflow:hidden;">
      <div style="height:150px;background:${GRADS[cat]};display:flex;align-items:center;justify-content:center;">
        <i class="fas ${ICONS[cat]}" style="font-size:2.5rem;color:rgba(255,255,255,0.8);"></i>
      </div>
      <div style="padding:12px;">
        <h4 style="margin:0 0 4px;font-size:0.9rem;">${b.title}</h4>
        <p style="margin:0 0 8px;font-size:0.78rem;color:#666;">${b.author}</p>
        <p style="margin:0 0 10px;font-size:0.82rem;color:${b.available?'green':'var(--red-itp)'};">
          ${b.available ? '✓ Disponible' : '✗ Emprunté'}</p>
        <button class="btn-outline" style="width:100%;padding:6px;font-size:0.8rem;"
          onclick="${b.available ? `borrowBook(${b.id},'${b.title.replace(/'/g,"\\'")}')` : `reserveBook(${b.id},'${b.title.replace(/'/g,"\\'")}')` }">
          ${b.available ? '<i class="fas fa-book-open"></i> Emprunter' : '<i class="fas fa-bookmark"></i> Réserver'}
        </button>
      </div>
    </div>`;
  }).join('') || '<p style="color:#999;grid-column:1/-1;text-align:center;">Aucun livre trouvé.</p>';
}

function filterCat(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderBooks(cat === 'all' ? allBooks : allBooks.filter(b => getCat(b) === cat));
}

function searchBooks() {
  const q = document.getElementById('search-book').value.toLowerCase();
  renderBooks(q ? allBooks.filter(b => (b.title + b.author).toLowerCase().includes(q)) : allBooks);
}

function populateReserveSelect(books) {
  const sel = document.getElementById('reserve-book');
  sel.innerHTML = '<option value="">— Choisir —</option>' + books.filter(b=>!b.available).map(b=>`<option value="${b.id}">${b.title}</option>`).join('');
}

function loadLoans() {
  const st = { retard:'badge-danger', encours:'badge-info', rendu:'badge-success' };
  const sl = { retard:`En retard`, encours:'En cours', rendu:'Rendu' };
  document.getElementById('loans-list').innerHTML = myLoans.length
    ? myLoans.map(l => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--light-grey);border-radius:6px;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
          <div>
            <strong>${l.book}</strong>
            <p style="margin:3px 0 0;font-size:0.82rem;color:#666;">Emprunté le ${l.date_emprunt} | Retour prévu : ${l.retour_prevu}</p>
            ${l.jours_retard > 0 ? `<p style="margin:3px 0 0;color:var(--red-itp);font-size:0.82rem;">⚠️ ${l.jours_retard} jour(s) de retard — Amende : ${l.jours_retard*500} FCFA</p>` : ''}
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="badge ${st[l.status]||''}">${sl[l.status]||l.status}</span>
            ${l.status !== 'rendu' ? `<button class="btn-success" style="padding:5px 12px;font-size:0.8rem;" onclick="returnBook('${l.book.replace(/'/g,"\\'")}',this)"><i class="fas fa-undo"></i> Retourner</button>` : ''}
          </div>
        </div>`).join('')
    : '<p style="color:#999;text-align:center;padding:20px;">Aucun emprunt en cours.</p>';
}

function loadReservations() {
  const sl = { en_attente:'badge-warning', disponible:'badge-success', expiree:'badge-danger' };
  const ll = { en_attente:'En attente', disponible:'Disponible !', expiree:'Expirée' };
  document.getElementById('reservations-list').innerHTML = FB_RESERVATIONS.length
    ? FB_RESERVATIONS.map(r => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--light-grey);border-radius:6px;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
          <div><strong>${r.book}</strong><p style="margin:3px 0 0;font-size:0.82rem;color:#666;">Réservé le ${r.date_reservation}</p></div>
          <span class="badge ${sl[r.status]||''}">${ll[r.status]||r.status}</span>
        </div>`).join('')
    : '<p style="color:#999;text-align:center;padding:15px;">Aucune réservation.</p>';
}

function loadFines() {
  const total = FB_FINES.reduce((s,f)=>s+f.montant,0);
  document.getElementById('fines-list').innerHTML = FB_FINES.length
    ? FB_FINES.map(f => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid #ffd0b0;background:#fff8f3;border-radius:6px;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
          <div><strong>${f.book}</strong><p style="margin:3px 0 0;font-size:0.82rem;color:var(--red-itp);">${f.jours} jour(s) de retard</p></div>
          <div class="d-flex align-center gap-10">
            <strong style="color:var(--red-itp);">${f.montant.toLocaleString('fr-FR')} FCFA</strong>
            <button class="btn-primary" style="padding:5px 12px;font-size:0.8rem;" onclick="payFine('${f.book.replace(/'/g,"\\'")}',${f.montant},this)">Payer</button>
          </div>
        </div>`).join('')
    + `<div style="text-align:right;font-weight:bold;margin-top:10px;color:var(--red-itp);">Total dû : ${total.toLocaleString('fr-FR')} FCFA</div>`
    : '<p style="color:#2e7d32;text-align:center;padding:20px;"><i class="fas fa-check-circle"></i> Aucune amende en cours.</p>';
}

async function borrowBook(id, title) {
  const user = ITP_API.auth.currentUser();
  if (!user) { if(confirm('Connectez-vous pour emprunter.')) window.location.href='../auth/login.html'; return; }
  try { await ITP_API.library.borrow(id, user.student_id||1); } catch {}
  myLoans.unshift({ book:title, date_emprunt:new Date().toLocaleDateString('fr-FR'), retour_prevu: new Date(Date.now()+14*86400000).toLocaleDateString('fr-FR'), status:'encours', jours_retard:0 });
  loadLoans();
  showToast(`📚 Emprunt de "${title}" enregistré ! Passez au campus dans 24h.`, 'success', 5000);
  Security.log('book_borrowed', { book_id: id, title });
}

function reserveBook(id, title) {
  FB_RESERVATIONS.push({ book:title, date_reservation:new Date().toLocaleDateString('fr-FR'), status:'en_attente' });
  loadReservations();
  showToast(`📌 "${title}" réservé ! Vous serez notifié quand il est disponible.`, 'info', 4000);
}

function makeReservation() {
  const sel = document.getElementById('reserve-book');
  const title = sel.options[sel.selectedIndex]?.text;
  if (!sel.value) { showToast('Sélectionnez un livre.', 'warning'); return; }
  reserveBook(sel.value, title);
}

function returnBook(title, btn) {
  const loan = myLoans.find(l => l.book === title);
  if (loan) loan.status = 'rendu';
  loadLoans();
  showToast(`✅ Retour de "${title}" enregistré. Merci !`, 'success');
  Security.log('book_returned', { title });
}

function payFine(book, amount, btn) {
  showToast(`💳 Paiement de ${amount.toLocaleString('fr-FR')} FCFA pour "${book}" initié.`, 'success', 4000);
  btn.closest('div[style]').style.opacity = '0.5';
  btn.disabled = true;
  btn.textContent = '✓ Payé';
}

document.addEventListener('DOMContentLoaded', () => {
  initTabs('tabs-biblio');
  loadBooks();
  loadLoans();
  loadReservations();
  loadFines();
});
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(()=>{})}</script>
</body></html>
