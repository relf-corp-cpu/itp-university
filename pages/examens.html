<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gestion des Examens — ITP University</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" href="../assets/images/icon-192.png">
<link rel="manifest" href="../manifest.json"><meta name="theme-color" content="#1D3557"></head><body>
<a href="#main-content" class="sr-only" style="position:absolute;left:-999px;" onfocus="this.style.left='10px'">Aller au contenu principal</a>

<div id="itp-header"></div>
<main role="main" id="main-content" style="padding:50px;max-width:1100px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:15px;">
    <h2 class="m-0">Gestion des Examens</h2>
    <div class="d-flex gap-10">
      <button class="btn-outline" onclick="Excel.exportCSV(allExams,'examens_itp.csv')"><i class="fas fa-file-excel"></i> Exporter</button>
      <button class="btn-primary" onclick="openAddExam()"><i class="fas fa-plus"></i> Planifier un examen</button>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;margin-bottom:30px;">
    <div class="stat-card" style="border-left-color:#1D3557;">
      <p class="stat-label">Total Examens</p>
      <div id="stat-total" class="stat-val">—</div>
    </div>
    <div class="stat-card" style="border-left-color:#e63946;">
      <p class="stat-label">Cette Semaine</p>
      <div id="stat-week" class="stat-val">—</div>
    </div>
    <div class="stat-card" style="border-left-color:#2a9d8f;">
      <p class="stat-label">Sessions</p>
      <div class="stat-val">2</div>
    </div>
    <div class="stat-card" style="border-left-color:#e9c46a;">
      <p class="stat-label">Rattrapage</p>
      <div class="stat-val">Août 2026</div>
    </div>
  </div>

  <!-- Filtres -->
  <div class="card" style="margin-bottom:25px;">
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <select id="filter-type" class="form-control" style="width:auto;flex:1;min-width:150px;" onchange="filterExams()">
        <option value="">Tous les types</option>
        <option value="DST">DST</option>
        <option value="Session">Session</option>
        <option value="Rattrapage">Rattrapage</option>
        <option value="TP">TP Noté</option>
      </select>
      <select id="filter-filiere" class="form-control" style="width:auto;flex:1;min-width:150px;" onchange="filterExams()">
        <option value="">Toutes les filières</option>
        <option>Génie Logiciel</option>
        <option>Réseaux & Télécoms</option>
        <option>Cybersécurité</option>
      </select>
      <input type="month" id="filter-month" class="form-control" style="width:auto;flex:1;" value="2026-06" onchange="filterExams()">
    </div>
  </div>

  <!-- Table des examens -->
  <div class="card" style="padding:0;overflow:hidden;">
    <div class="table-wrapper">
      <table class="data-table" role="table">
        <thead><tr>
          <th>Matière</th><th>Filière</th><th>Type</th>
          <th>Date</th><th>Heure</th><th>Salle</th>
          <th>Durée</th><th>Surveillants</th><th>Action</th>
        </tr></thead>
        <tbody id="exams-table">
          <tr><td colspan="9" style="padding:20px;text-align:center;color:#999;"><i class="fas fa-spinner fa-spin"></i></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
<div id="itp-footer"></div>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/tests.js"></script>
<script src="../assets/js/components.js"></script>
<script>
let allExams = [
  { id:1, course:'Algorithmique',     filiere:'Génie Logiciel',      type:'DST',        date:'2026-02-03', heure:'08:00', salle:'Amphi A',   duree:'2h', surveillants:'Prof. Moukoko, Prof. Martin' },
  { id:2, course:'Base de données',   filiere:'Génie Logiciel',      type:'DST',        date:'2026-02-05', heure:'10:00', salle:'Salle 204', duree:'2h', surveillants:'Prof. Martin' },
  { id:3, course:'Réseaux Mobiles',   filiere:'Réseaux & Télécoms',  type:'Session',    date:'2026-04-07', heure:'08:00', salle:'Salle 101', duree:'3h', surveillants:'Prof. Nguimbi' },
  { id:4, course:'Développement Web', filiere:'Génie Logiciel',      type:'Session',    date:'2026-04-09', heure:'14:00', salle:'Salle 204', duree:'3h', surveillants:'Prof. Moukoko' },
  { id:5, course:'Cybersécurité',     filiere:'Cybersécurité',       type:'Session',    date:'2026-04-14', heure:'08:00', salle:'Amphi A',   duree:'3h', surveillants:'Prof. Ibara' },
  { id:6, course:'Mathématiques',     filiere:'Génie Logiciel',      type:'Rattrapage', date:'2026-08-11', heure:'08:00', salle:'Salle 101', duree:'2h', surveillants:'Prof. Louzolo' },
  { id:7, course:'TP Développement',  filiere:'Génie Logiciel',      type:'TP',         date:'2026-06-30', heure:'14:00', salle:'Salle Machine', duree:'4h', surveillants:'Prof. Moukoko' },
];

const typeColors = { DST:'badge-info', Session:'badge-danger', Rattrapage:'badge-warning', TP:'badge-success' };

function renderExams(list) {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('stat-total').textContent = allExams.length;
  const thisWeek = allExams.filter(e => {
    const d = new Date(e.date), now = new Date();
    return d >= now && d <= new Date(now.getTime() + 7*86400000);
  }).length;
  document.getElementById('stat-week').textContent = thisWeek;

  document.getElementById('exams-table').innerHTML = list.length ? list.map(ex => {
    const past = ex.date < today;
    return `<tr style="opacity:${past?0.6:1};">
      <td style="font-weight:500;">${ex.course}</td>
      <td>${ex.filiere}</td>
      <td><span class="badge ${typeColors[ex.type]||''}">${ex.type}</span></td>
      <td>${new Date(ex.date).toLocaleDateString('fr-FR')}</td>
      <td>${ex.heure}</td>
      <td>${ex.salle}</td>
      <td>${ex.duree}</td>
      <td style="font-size:0.82rem;color:#666;">${ex.surveillants}</td>
      <td>
        <button class="btn-outline" style="padding:4px 10px;font-size:0.8rem;" onclick="editExam(${ex.id})"><i class="fas fa-edit"></i></button>
        <button class="btn-danger" style="padding:4px 10px;font-size:0.8rem;margin-left:4px;" onclick="deleteExam(${ex.id})"><i class="fas fa-trash"></i></button>
      </td>
    </tr>`;
  }).join('') : '<tr><td colspan="9" style="padding:20px;text-align:center;color:#999;">Aucun examen trouvé.</td></tr>';
}

function filterExams() {
  const type    = document.getElementById('filter-type').value;
  const filiere = document.getElementById('filter-filiere').value;
  const month   = document.getElementById('filter-month').value;
  renderExams(allExams.filter(e =>
    (!type    || e.type === type) &&
    (!filiere || e.filiere === filiere) &&
    (!month   || e.date.startsWith(month))
  ));
}

function openAddExam() {
  Modal.show('Planifier un examen',
    `<div class="form-group"><label>Matière</label><input type="text" id="m-course" class="form-control" placeholder="Algorithmique..."></div>
     <div class="form-grid-2">
       <div class="form-group"><label>Type</label><select id="m-type" class="form-control"><option>DST</option><option>Session</option><option>Rattrapage</option><option>TP</option></select></div>
       <div class="form-group"><label>Filière</label><select id="m-filiere" class="form-control"><option>Génie Logiciel</option><option>Réseaux & Télécoms</option><option>Cybersécurité</option></select></div>
       <div class="form-group"><label>Date</label><input type="date" id="m-date" class="form-control"></div>
       <div class="form-group"><label>Heure</label><input type="time" id="m-heure" class="form-control"></div>
       <div class="form-group"><label>Salle</label><select id="m-salle" class="form-control"><option>Amphi A</option><option>Salle 101</option><option>Salle 204</option><option>Salle Machine</option></select></div>
       <div class="form-group"><label>Durée</label><select id="m-duree" class="form-control"><option>1h</option><option>2h</option><option>3h</option><option>4h</option></select></div>
     </div>
     <div class="form-group"><label>Surveillants</label><input type="text" id="m-surv" class="form-control" placeholder="Prof. Moukoko, Prof. Martin"></div>`,
    [{ label:'Ajouter', cls:'btn-primary', fn:'saveExam()' }, { label:'Annuler', cls:'btn-outline', fn:'Modal.close()' }]
  );
}

function saveExam() {
  const course = document.getElementById('m-course')?.value?.trim();
  const date   = document.getElementById('m-date')?.value;
  if (!course || !date) { showToast('Remplissez les champs obligatoires.', 'warning'); return; }
  const newEx = {
    id: Date.now(), course,
    filiere: document.getElementById('m-filiere').value,
    type: document.getElementById('m-type').value,
    date, heure: document.getElementById('m-heure').value,
    salle: document.getElementById('m-salle').value,
    duree: document.getElementById('m-duree').value,
    surveillants: document.getElementById('m-surv').value,
  };
  allExams.unshift(newEx);
  Modal.close();
  renderExams(allExams);
  showToast('✅ Examen planifié avec succès !', 'success');
  Security.log('exam_created', { course, date });
  // Notifier
  Notifs.push('Nouvel examen planifié', `${newEx.type} de ${course} le ${new Date(date).toLocaleDateString('fr-FR')}`);
}

function editExam(id) {
  showToast('Module d\'édition — bientôt disponible.', 'info');
}

function deleteExam(id) {
  if (!confirm('Supprimer cet examen ?')) return;
  allExams = allExams.filter(e => e.id !== id);
  renderExams(allExams);
  showToast('Examen supprimé.', 'success');
  Security.log('exam_deleted', { id });
}

renderExams(allExams);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(()=>{})}</script>
</body></html>
