<!DOCTYPE html><html lang="fr"><head>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1D3557"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Réinitialisation — ITP University</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="icon" href="../assets/images/icon-192.png"></head><body>
<a href="#main-content" class="sr-only" style="position:absolute;left:-999px;" onfocus="this.style.left='10px'">Aller au contenu principal</a>

<div id="itp-header"></div>
<main id="main-content" style="display:flex;justify-content:center;align-items:center;min-height:80vh;background-color:#f4f7f6;padding:40px 20px;">
  <div class="card" style="width:100%;max-width:400px;box-shadow:0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="text-align:center;margin-bottom:20px;">Réinitialisation</h2>
    <p style="color:#666;margin-bottom:30px;text-align:center;">Saisissez votre adresse email pour recevoir un lien de réinitialisation.</p>
    <form onsubmit="event.preventDefault();alert('Un lien de réinitialisation a été envoyé à votre adresse email.');">
      <div class="mb-20"><label class="form-label">Email</label><input type="email" id="reset-email" required aria-required="true" class="form-control"></div>
      <button type="submit" aria-live="polite" class="btn-primary" style="width:100%;padding:12px;">Envoyer le lien</button>
    </form>
    <p style="text-align:center;margin-top:20px;"><a href="login.html" style="color:var(--dark-blue);">← Retour à la connexion</a></p>
  </div>
</main>
<div id="itp-footer"></div>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js></script><script src="../assets/js/components.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js').catch(() => {});
}
</script>

<!-- PWA Banner -->
<div id="pwa-banner">
  <div class="d-flex align-center gap-12">
    <img src="../assets/images/icon-192.png" style="width:36px;height:36px;border-radius:8px;">
    <div><strong>ITP University</strong><br><small>Installer l'application sur votre appareil</small></div>
  </div>
  <div class="d-flex gap-10">
    <button onclick="installPWA()" style="background:white;color:var(--dark-blue);border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font-weight:bold;">Installer</button>
    <button onclick="dismissPWA()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:1.2rem;">&#x2715;</button>
  </div>
</div>
<script src="../assets/js/tests.js"></script>
</body></html>
